name: Build & Publish TRX Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build
        env:
            GH_TOKEN: ${{ secrets.Pushatore }}

      - name: Upload artifacts for debugging
        uses: actions/upload-artifact@v4
        with:
          name: TRXLauncher-${{ matrix.os }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 1: Delete existing release assets (force overwrite)
      - name: Delete previous release assets
        uses: peter-evans/delete-release@v2
        with:
          tag_name: v0.1
          github_token: ${{ secrets.Pushatore }}

      # Step 2: Create release v0.1
      - name: Create release v0.1
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.Pushatore }}
        with:
          tag_name: v0.1
          release_name: TRX Launcher 0.1
          body: Initial release of TRX Launcher
          draft: false
          prerelease: false

      # Step 3: Upload all built artifacts to the release
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.Pushatore }}
        with:
          tag_name: v0.1
          overwrite: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
