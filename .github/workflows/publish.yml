name: Build & Release TRX Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18.x]

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build Electron app
      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.Pushatore }}

      # 5️⃣ Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TRXLauncher-${{ matrix.os }}
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 1️⃣ Checkout again
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Create release
      - name: Create GitHub Release 0.1
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v0.1
          release_name: TRX Launcher 0.1
          body: "Initial release of TRX Launcher"
          draft: false
          prerelease: false
          token: ${{ secrets.Pushatore }}

      # 3️⃣ Upload artifacts to release
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.Pushatore }}
