name: Build & Update TRX Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18.x]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.Pushatore }}

      - name: Upload build artifacts (for workflow download)
        uses: actions/upload-artifact@v4
        with:
          name: TRXLauncher-${{ matrix.os }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Upload artifacts to existing release v0.1
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.Pushatore }}
        with:
          tag_name: v0.1
          overwrite: true   # <-- forza la sovrascrittura degli artifacts
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
