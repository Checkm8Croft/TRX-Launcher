name: Build & Publish TRX Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      # 🔥 BUILD DIFFERENZIATO PER OS
      - name: Build Electron app
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win portable
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac dmg --x64 --arm64
          else
            npx electron-builder --linux AppImage
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.Pushatore }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TRXLauncher-${{ matrix.os }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: ls -R artifacts
      - name: Rename files safely
        run: |
          shopt -s globstar
          for f in artifacts/**/*; do
            new=$(echo "$f" | tr ' ' '-')
            if [ "$f" != "$new" ]; then
              mv "$f" "$new"
            fi
          done
      # 🔥 Upload pulito nella release
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.Pushatore }}
        with:
          tag_name: v0.1
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
