name: Build & Publish TRX Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.Pushatore }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TRXLauncher-${{ matrix.os }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔥 SCARICA TUTTI GLI ARTIFACTS
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 🔍 DEBUG (puoi rimuoverlo dopo)
      - name: List files
        run: ls -R artifacts

      # 🚀 UPLOAD NELLA RELEASE
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.Pushatore }}
        with:
          tag_name: v0.1
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
